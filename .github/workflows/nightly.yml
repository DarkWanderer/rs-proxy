name: Nightly Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build and publish nightly release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build release binaries
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Collect binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/gatekeeper gatekeeper-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-musl/release/gatekeeper gatekeeper-x86_64-unknown-linux-musl

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly \
            gatekeeper-x86_64-unknown-linux-gnu \
            gatekeeper-x86_64-unknown-linux-musl \
            --title "Nightly" \
            --notes "Nightly build from main branch ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --prerelease
