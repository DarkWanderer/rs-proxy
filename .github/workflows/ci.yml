name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@2f388922703f86d338d8d1e86e4cedef98b9e790 # cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: lcov.info
          fail_ci_if_error: false

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Run Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  security:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@9b7d65878c2d28c8e3c16e30bf555c29abe505bd # v2.0.11
        with:
          command: check

  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Build
        run: cargo build --release

      - name: Generate TLS certificates
        run: bash example/gen-certs.sh

      - name: Start proxy
        run: |
          cd example
          ../target/release/gatekeeper --config gatekeeper.toml &
          echo $! > /tmp/gatekeeper.pid
          # Wait for the proxy to finish binding with a retry loop
          for i in $(seq 1 30); do
            if curl -sf --max-time 1 http://127.0.0.1:3128/proxy.pac -o /dev/null 2>/dev/null; then
              break
            fi
            sleep 0.1
          done

      - name: Test HTTPS via proxy to google.com
        run: |
          cd example
          curl -v \
            --max-time 30 \
            --proxy https://127.0.0.1:3128 \
            --proxy-cacert certs/ca.crt \
            --proxy-cert certs/client.crt \
            --proxy-key certs/client.key \
            https://www.google.com \
            -o /dev/null

      - name: Test PAC endpoint responds with 200
        run: |
          curl -sv --max-time 10 http://127.0.0.1:3128/proxy.pac -o /dev/null

      - name: Test denied domain returns 403
        run: |
          cd example
          # evil.example.com is not in the allowlist — expect 403
          response=$(curl -v -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            --proxy https://127.0.0.1:3128 \
            --proxy-cacert certs/ca.crt \
            --proxy-cert certs/client.crt \
            --proxy-key certs/client.key \
            https://evil.example.com/ || true)
          test "$response" = "403" || (echo "Expected 403 for denied domain, got $response" && exit 1)

      - name: Test plaintext non-PAC request returns 403
        run: |
          # Non-PAC path over plaintext should be rejected
          response=$(curl -sv -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://127.0.0.1:3128/not-pac || true)
          test "$response" = "403" || (echo "Expected 403 for non-PAC plaintext request, got $response" && exit 1)

      - name: Stop proxy
        if: always()
        run: kill "$(cat /tmp/gatekeeper.pid)" 2>/dev/null || true
